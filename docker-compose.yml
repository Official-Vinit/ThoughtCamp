version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virtualcourses_backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - FRONTEND_URL=http://localhost:5173
      - NODE_ENV=development
      # IMPORTANT: Define your other necessary environment variables below
      # or use an env_file as shown below
      # - MONGODB_URI=your_mongodb_uri
      # - CLOUDINARY_API_KEY=your_key
      # - CLOUDINARY_API_SECRET=your_secret
      # - CLOUDINARY_CLOUD_NAME=your_name
    # env_file:
    #   - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: virtualcourses_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
